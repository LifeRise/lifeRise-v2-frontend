version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: liferise-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: liferise_secret
      MYSQL_DATABASE: liferise
      MYSQL_USER: liferise
      MYSQL_PASSWORD: liferise_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liferise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: liferise-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LIFERISE_APP_ENV: development
      LIFERISE_APP_DEBUG: "true"
      LIFERISE_DATABASE_HOST: mysql
      LIFERISE_DATABASE_PORT: "3306"
      LIFERISE_DATABASE_DATABASE: liferise
      LIFERISE_DATABASE_USERNAME: liferise
      LIFERISE_DATABASE_PASSWORD: liferise_secret
      LIFERISE_REDIS_HOST: redis
      LIFERISE_REDIS_PORT: "6379"
      LIFERISE_JWT_SECRET: local-development-jwt-secret-min-32-chars
      LIFERISE_STRIPE_SECRET_KEY: ""
      LIFERISE_STRIPE_WEBHOOK_SECRET: ""
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
