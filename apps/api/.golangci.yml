version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  default: standard
  disable:
    # TODO(boyscout): re-enable after fixing 12 unchecked error returns
    - errcheck
    # TODO(boyscout): re-enable after fixing 30 unused identifiers (mostly test helpers)
    - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - docs
    - scripts
    - migrations
