# LifeRise Go Backend — Railway service configuration
#
# In Railway, create one service PER binary and set:
#   Source > Root Directory = apps/api
#   Build > Dockerfile Path = Dockerfile.api  (or .vendor / .admin / .worker)
#
# This file is the config for the *customer API* service (port 8080).
# Duplicate the Railway service for vendor-api and admin-api, changing
# dockerfilePath and the LIFERISE_SERVER_PORT env var accordingly.
#
# Required Railway environment variables (set in Railway dashboard):
#   LIFERISE_DATABASE_URL         — Supabase/PostgreSQL connection string
#   LIFERISE_REDIS_URL            — Redis connection string (Railway Redis addon)
#   LIFERISE_JWT_SECRET           — Min 32-character secret
#   LIFERISE_STRIPE_SECRET_KEY    — Stripe secret key
#   LIFERISE_STRIPE_WEBHOOK_SECRET
#   LIFERISE_CORS_ALLOW_ORIGINS   — Comma-separated: https://your-app.vercel.app,https://yourdomain.com
#   LIFERISE_SERVER_PORT          — 8080 (api) | 8081 (vendor-api) | 8082 (admin-api)
#   LIFERISE_APP_ENV              — production

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.api"

[deploy]
startCommand = "./api-server"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
