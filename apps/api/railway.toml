# LifeRise Go Backend — Railway service configuration
#
# IMPORTANT — monorepo setup:
#   In the Railway dashboard, set for this service:
#     Source > Root Directory  = apps/api
#     Source > GitHub Repo     = LifeRise/LifeRise-Enterprise
#     Source > Branch          = main
#     Source > Auto Deploy     = ON
#
#   The Root Directory setting is what makes auto-deploy work.
#   Without it, Railway looks for this file and the Dockerfiles at the
#   repo root, finds nothing, and the build/deploy fails.
#
# One service PER binary — duplicate the service for vendor-api and admin-api,
# changing dockerfilePath and the LIFERISE_SERVER_PORT env var accordingly.
#
# Required Railway environment variables (set in Railway dashboard):
#   LIFERISE_DATABASE_URL         — Supabase/PostgreSQL connection string
#   LIFERISE_REDIS_URL            — Redis connection string (Railway Redis addon)
#   LIFERISE_JWT_SECRET           — Min 32-character secret
#   LIFERISE_STRIPE_SECRET_KEY    — Stripe secret key
#   LIFERISE_STRIPE_WEBHOOK_SECRET
#   LIFERISE_CORS_ALLOW_ORIGINS   — Comma-separated: https://your-app.vercel.app,https://yourdomain.com
#   LIFERISE_APP_ENV              — production
#
# NOTE: Do NOT manually set LIFERISE_SERVER_PORT — Railway injects PORT automatically.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.api"

[deploy]
startCommand = "./api-server"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
